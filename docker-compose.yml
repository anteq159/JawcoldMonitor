services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jawcold
      POSTGRES_USER: jawcold
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jawcold_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jawcold"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://jawcold:${DB_PASSWORD:-jawcold_dev_pass}@postgres/jawcold
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-32chars}
      PREVIEW_MODE: ${PREVIEW_MODE:-false}
      RS485_PORTS: ${RS485_PORTS:-/dev/ttyUSB0}
      RS485_BAUDRATE: ${RS485_BAUDRATE:-9600}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      OFFLINE_ALARM_MINUTES: ${OFFLINE_ALARM_MINUTES:-5}
      DISK_ALARM_PERCENT: ${DISK_ALARM_PERCENT:-90}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_SYSTEM_CHANNELS: ${NOTIFY_SYSTEM_CHANNELS:-}
      BACKUP_AUTO_ENABLED: ${BACKUP_AUTO_ENABLED:-false}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_DIR: ${BACKUP_DIR:-backups}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
    # Bind-mounted rather than left baked into the image (COPY . . in the
    # Dockerfile still runs, but this overlays it at runtime): an update
    # uploaded through Settings extracts into this same host path, so it
    # survives the container restart that applies it. Also means local
    # code edits show up without a rebuild - a real side benefit, not a
    # workaround. alembic/versions is mounted too, not just app/ - a
    # migration script has to actually be on disk for `alembic upgrade
    # head` (run at every startup, see init_db()) to find and apply it;
    # an update that ships new tables/columns but not the migration that
    # creates them would leave the new code pointed at a schema that was
    # never updated.
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic/versions:/app/alembic/versions
      # Uploaded floor maps and automatic backups live under /app inside
      # the container - without these binds a rebuild (install.sh re-run
      # with --build) would silently wipe them.
      - ./backend/uploads:/app/uploads
      - ./backend/backups:/app/backups
      # The host .env, so the panel can edit deploy-level values like
      # PANEL_PORT from Ustawienia. install.sh always creates .env before
      # `compose up` - don't run compose manually without it, or Docker
      # will create a directory named .env in its place.
      - ./.env:/app/host.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
