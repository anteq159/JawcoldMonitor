worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    # Hide the nginx version in error pages and the Server header.
    server_tokens off;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Security headers (inherited by every location below - none of
        # them declares add_header of its own, which would reset these).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;
        # style-src 'unsafe-inline': React inline style={} attributes and
        # recharts both need it. img-src blob:/data:: map thumbnails and
        # chart exports. connect-src ws:/wss:: the live WebSocket stream
        # ('self' alone doesn't cover ws in every browser version).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

        # WebSocket proxy. access_log off: the JWT rides in the query
        # string (browsers can't set headers on WebSocket), and default
        # logging would write every token into the access log.
        location /ws {
            access_log off;
            proxy_pass http://backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # API proxy. Body limit sized for the largest legitimate uploads
        # (update packages, floor maps, backup restores) - the backend
        # enforces its own tighter per-endpoint limits on top.
        location /api/ {
            client_max_body_size 100m;
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SPA — serve index.html for all frontend routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
